stages:
  data_ingestion:
    cmd: python -m src.pipeline.stage_01_ingestion
    deps:
      - src/pipeline/stage_01_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/books.csv

  data_validation:
    cmd: python -m src.pipeline.stage_02_validation
    deps:
      - src/pipeline/stage_02_validation.py
      - config/schema.yaml
      - artifacts/data_ingestion/books.csv
    params:
      - config/params.yaml:
          - data_validation.min_desc_len
          - data_validation.categories_min_len
    outs:
      - artifacts/data_validation/clean_books.csv

  data_enrichment:
    cmd: python -m src.pipeline.stage_03_enrichment
    deps:
      - src/pipeline/stage_03_enrichment.py
      - config/schema.yaml
      - artifacts/data_validation/clean_books.csv
    params:
      - config/params.yaml:
          - data_enrichment.model_name
          - data_enrichment.candidate_labels
          - data_enrichment.batch_size
    outs:
      - artifacts/data_enrichment/enriched_books.csv

  tone_analysis:
    cmd: python -m src.pipeline.stage_04_tone_analysis
    deps:
      - src/pipeline/stage_04_tone_analysis.py
      - config/schema.yaml
      - artifacts/data_enrichment/enriched_books.csv
    params:
      - config/params.yaml:
          - tone_analysis.model_name
          - tone_analysis.target_emotions
          - tone_analysis.batch_size
          - tone_analysis.min_sentence_len
          - tone_analysis.max_sentences_per_book
          - tone_analysis.detection_threshold
    outs:
      - artifacts/tone_analysis/toned_books.csv

  data_transformation:
    cmd: python -m src.pipeline.stage_05_transformation
    deps:
      - src/pipeline/stage_05_transformation.py
      - config/schema.yaml
      - artifacts/tone_analysis/toned_books.csv
    params:
      - config/params.yaml:
          - data_transformation.test_size
          - data_transformation.val_size
          - data_transformation.random_state
    outs:
      - artifacts/data_transformation

  model_training:
    cmd: python -m src.pipeline.stage_06_training
    deps:
      - src/pipeline/stage_06_training.py
      - config/config.yaml
      - config/schema.yaml
      - artifacts/data_transformation/train.csv
    params:
      - config/params.yaml:
          - model_trainer.model_name
          - model_trainer.collection_name
          - model_trainer.batch_size
    outs:
      - artifacts/model_trainer/vectordb

  prediction:
    cmd: python -m src.pipeline.stage_07_prediction
    deps:
      - src/pipeline/stage_07_prediction.py
      - src/models/hybrid_recommender.py
      - config/schema.yaml
      - artifacts/model_trainer/vectordb
      - artifacts/tone_analysis/toned_books.csv
    params:
      - config/params.yaml:
          - inference.top_k
          - inference.popularity_weight
          - inference.filtered_search_boost
    outs:
      - artifacts/prediction/results.txt

  model_evaluation:
    cmd: python -m src.pipeline.stage_08_evaluation
    deps:
      - src/pipeline/stage_08_evaluation.py
      - config/config.yaml
      - artifacts/data_transformation/test.csv
      - artifacts/model_trainer/vectordb
    params:
      - config/params.yaml:
          - mlflow.uri
          - mlflow.experiment_name
    metrics:
      - artifacts/model_evaluation/metrics.json:
          cache: false