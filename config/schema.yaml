# Data Contracts & Schema Mapping
# This file maps logical column names to the physical CSV column names
# and defines data types for validation.

columns:
  isbn: isbn13
  title: title
  authors: authors
  description: description
  categories: categories
  rating: average_rating
  ratings_count: ratings_count
  thumbnail: thumbnail
  subtitle: subtitle
  published_year: published_year
  num_pages: num_pages

target_column:
  name: average_rating

# For enriched data columns
enriched_columns:
  simple_category: simple_category
  dominant_tone: dominant_tone

# Data Types for Validation
types:
  isbn13: int
  isbn10: str
  title: str
  subtitle: str
  authors: str
  categories: str
  thumbnail: str
  description: str
  published_year: float
  average_rating: float
  num_pages: float
  ratings_count: float
