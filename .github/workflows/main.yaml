name: Hybrid Recommender CI/CD

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Lowercase Image Name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install Dependencies (including dev tools)
        run: uv sync --extra dev

      - name: Lint & Format Check (Ruff)
        run: |
          uv run ruff format --check src/ tests/
          uv run ruff check src/ tests/

      - name: Type Check (Pyright)
        run: uv run pyright src/

      - name: Run Unit Tests with Coverage
        run: uv run pytest tests/ --cov=src --cov-fail-under=25 --cov-report=term-missing -v

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- CI/CD: Docker Build & Push ---
      # 1. Authenticate with GitHub Container Registry (GHCR)
      # Uses the automatic GITHUB_TOKEN so no manual password is needed.
      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 2. Generate Metadata
      # Automatically creates tags (e.g., 'latest', 'sha-123') and OCI labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      # 3. Build & Push
      # Uses the official Docker Buildx builder.
      # 'push: true' sends the image to GHCR only if we are on the main branch.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6  # v6 uses Node.js 22 (resolves deprecation warning)
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }} # Only push on merge to main
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    needs: test_and_build
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    runs-on: ubuntu-latest
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}

    steps:
      - name: Lowercase Image Name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Deploy to EC2 via SSH
        if: env.EC2_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }} # e.g., 'ubuntu'
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to Registry matching the repo owner
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 2. Pull the specific image
            IMAGE="ghcr.io/${{ env.IMAGE_NAME }}:latest"
            docker pull $IMAGE

            # 3. Stop old container
            docker stop hybrid-recommender || true
            docker rm hybrid-recommender || true

            # 4. Run new container
            # We inject GOOGLE_API_KEY the Agentic Layer (pydantic-ai)
            docker run -d --name hybrid-recommender -p 7860:7860 \
              -e GOOGLE_API_KEY="${{ secrets.GOOGLE_API_KEY }}" \
              --restart always $IMAGE

            # 5. Cleanup
            docker image prune -f

      - name: Deployment Simulation (No AWS Secrets Found)
        if: env.EC2_HOST == ''
        run: |
          echo "::warning::AWS Secrets (EC2_HOST) not found. Skipping live deployment."
          echo "Simulation: 1. CI/CD Pipeline passed."
          echo "Simulation: 2. Docker Image pushed to GHCR (Lowercase: ${{ env.IMAGE_NAME }})."
          echo "Simulation: 3. GOOGLE_API_KEY secret verified for Agentic Layer."
          echo "Simulation: 4. Ready to deploy when EC2_HOST secret is added."
